#@package training
_target_: src.train.pyro_trainer.PyroTrainer

# Training parameters
num_epochs: 1000
learning_rate: 0.01
batch_size: 32
optimizer: "adam"
scheduler: null

# Pyro-specific settings
num_samples: 1000
warmup_steps: 100
max_tree_depth: 10
step_size: 0.1

# Early stopping
early_stopping:
  patience: 50
  min_delta: 1e-6
  monitor: "loss"
